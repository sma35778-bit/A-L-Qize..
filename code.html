<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Qize - A/L Quiz Platform</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Animated gradient mesh background -->
    <div class="mesh-background">
        <div class="mesh-blob mesh-blob-1"></div>
        <div class="mesh-blob mesh-blob-2"></div>
        <div class="mesh-blob mesh-blob-3"></div>
        <div class="mesh-blob mesh-blob-4"></div>
    </div>

    <!-- Animated background particles -->
    <div class="particles" id="particles"></div>

    <!-- 3D Scene container -->
    <div class="scene-container">
        <div class="main-content">
            <header class="header">
                <h1 class="title-3d">QIZE</h1>
                <p class="subtitle">A/L Qize Exam Supporter</p>
            </header>

            <div class="categories-grid">
                <div class="category-card bio" data-category="bio">
                    <div class="card-inner">
                        <div class="card-front">
                            <div class="icon-container">
                                <div class="floating-icon">
                                    <svg viewBox="0 0 100 100" class="icon-svg">
                                        <path d="M50 10 C30 30, 20 50, 20 60 C20 75, 30 85, 50 90 C70 85, 80 75, 80 60 C80 50, 70 30, 50 10 Z" fill="currentColor"/>
                                        <circle cx="35" cy="50" r="5" fill="white"/>
                                        <circle cx="65" cy="50" r="5" fill="white"/>
                                    </svg>
                                </div>
                            </div>
                            <h2>BIOLOGY</h2>
                            <p>Cells, Genetics & Environment</p>
                            <div class="click-hint">START</div>
                        </div>
                    </div>
                </div>

                <div class="category-card physics" data-category="physics">
                    <div class="card-inner">
                        <div class="card-front">
                            <div class="icon-container">
                                <div class="floating-icon">
                                    <svg viewBox="0 0 100 100" class="icon-svg">
                                        <circle cx="50" cy="50" r="20" fill="none" stroke="currentColor" stroke-width="4"/>
                                        <circle cx="50" cy="50" r="30" fill="none" stroke="currentColor" stroke-width="2"/>
                                        <line x1="50" y1="30" x2="50" y2="10" stroke="currentColor" stroke-width="3"/>
                                        <line x1="50" y1="50" x2="70" y2="40" stroke="currentColor" stroke-width="3"/>
                                        <line x1="50" y1="50" x2="30" y2="40" stroke="currentColor" stroke-width="3"/>
                                    </svg>
                                </div>
                            </div>
                            <h2>PHYSICS</h2>
                            <p>Forces, Energy & Waves</p>
                            <div class="click-hint">START</div>
                        </div>
                    </div>
                </div>

                <div class="category-card chemistry" data-category="chemistry">
                    <div class="card-inner">
                        <div class="card-front">
                            <div class="icon-container">
                                <div class="floating-icon">
                                    <svg viewBox="0 0 100 100" class="icon-svg">
                                        <hexagon points="50,10 85,30 85,70 50,90 15,70 15,30" fill="none" stroke="currentColor" stroke-width="3"/>
                                        <text x="50" y="65" text-anchor="middle" font-size="40" font-weight="bold" fill="currentColor">H</text>
                                    </svg>
                                </div>
                            </div>
                            <h2>CHEMISTRY</h2>
                            <p>Molecules, Reactions & Bonds</p>
                            <div class="click-hint">START</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="quiz-data.js"></script>
    <script src="script.js"></script>
</body>
</html>
